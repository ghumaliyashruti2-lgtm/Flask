{% extends "base.html" %}

{% block content %}

<h1>{{ user.username }}'s Profile</h1>

<h2>Posts</h2>

{% for post in posts %}

<h3>{{ post.title }}</h3>
<p>{{ post.content }}</p>

{% else %}

<p>No posts yet.</p>

{% endfor %}


{% for comment in comments %}

<p>{{comment.text}}</p>

{% else %}

<p>No Comment yet.</p>

{% endfor %}

{% endblock %}
